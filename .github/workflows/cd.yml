name: CD

on:
  push:
    branches: [main, develop]
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - ".github/CODEOWNERS"
      - "LICENSE"
  workflow_dispatch:
    inputs:
      deploy_frontend:
        description: "Deploy frontend"
        type: boolean
        default: true
      deploy_backend:
        description: "Deploy backend"
        type: boolean
        default: true

concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: false

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      backend: ${{ steps.filter.outputs.backend }}
      frontend_version: ${{ steps.versions.outputs.frontend_version }}
      backend_version: ${{ steps.versions.outputs.backend_version }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36 # v3
        id: filter
        with:
          filters: |
            frontend:
              - 'frontend/**'
            backend:
              - 'backend/**'

      - name: Extract versions
        id: versions
        run: |
          echo "frontend_version=$(jq -r .version frontend/package.json)" >> "$GITHUB_OUTPUT"
          echo "backend_version=$(python3 -c "import tomllib; print(tomllib.loads(open('backend/pyproject.toml').read())['project']['version'])")" >> "$GITHUB_OUTPUT"

  build-and-deploy:
    needs: detect-changes
    if: >-
      needs.detect-changes.outputs.frontend == 'true' ||
      needs.detect-changes.outputs.backend == 'true' ||
      github.event.inputs.deploy_frontend == 'true' ||
      github.event.inputs.deploy_backend == 'true'
    runs-on: ubuntu-latest
    environment: production
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: ACR login
        run: az acr login --name ${{ vars.ACR_NAME }}

      - name: Set build ID
        run: echo "BUILD_ID=${GITHUB_SHA::7}-${{ github.run_number }}-${{ github.run_attempt }}" >> "$GITHUB_ENV"

      # --- Frontend ---

      - name: Build and push frontend
        if: >-
          needs.detect-changes.outputs.frontend == 'true' ||
          github.event.inputs.deploy_frontend == 'true'
        run: |
          VERSION="${{ needs.detect-changes.outputs.frontend_version }}"
          IMAGE="${{ vars.ACR_LOGIN_SERVER }}/frontend"
          docker build \
            --build-arg NEXT_PUBLIC_API_URL=https://${{ vars.BACKEND_FQDN }} \
            -t "${IMAGE}:${VERSION}-${BUILD_ID}" \
            -t "${IMAGE}:${VERSION}" \
            frontend/
          docker push "${IMAGE}:${VERSION}-${BUILD_ID}"
          docker push "${IMAGE}:${VERSION}"

      - name: Deploy frontend
        if: >-
          needs.detect-changes.outputs.frontend == 'true' ||
          github.event.inputs.deploy_frontend == 'true'
        run: |
          VERSION="${{ needs.detect-changes.outputs.frontend_version }}"
          VERSION_DASHES="${VERSION//./-}"
          az containerapp update \
            --name ${{ vars.FRONTEND_APP_NAME }} \
            --resource-group ${{ vars.RESOURCE_GROUP }} \
            --image "${{ vars.ACR_LOGIN_SERVER }}/frontend:${VERSION}-${BUILD_ID}" \
            --revision-suffix "v${VERSION_DASHES}-${BUILD_ID}"

      # --- Backend ---

      - name: Build and push backend
        if: >-
          needs.detect-changes.outputs.backend == 'true' ||
          github.event.inputs.deploy_backend == 'true'
        run: |
          VERSION="${{ needs.detect-changes.outputs.backend_version }}"
          IMAGE="${{ vars.ACR_LOGIN_SERVER }}/backend"
          docker build \
            --target production \
            -t "${IMAGE}:${VERSION}-${BUILD_ID}" \
            -t "${IMAGE}:${VERSION}" \
            backend/
          docker push "${IMAGE}:${VERSION}-${BUILD_ID}"
          docker push "${IMAGE}:${VERSION}"

      - name: Deploy backend
        if: >-
          needs.detect-changes.outputs.backend == 'true' ||
          github.event.inputs.deploy_backend == 'true'
        run: |
          VERSION="${{ needs.detect-changes.outputs.backend_version }}"
          VERSION_DASHES="${VERSION//./-}"
          az containerapp update \
            --name ${{ vars.BACKEND_APP_NAME }} \
            --resource-group ${{ vars.RESOURCE_GROUP }} \
            --image "${{ vars.ACR_LOGIN_SERVER }}/backend:${VERSION}-${BUILD_ID}" \
            --revision-suffix "v${VERSION_DASHES}-${BUILD_ID}"
